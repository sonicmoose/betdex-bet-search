name: Destroy Infra

on:
  workflow_dispatch:
    inputs:
      stack_name:
        description: CloudFormation/CDK stack name
        default: BetDexIndexerStack
        required: true
      aws_region:
        description: AWS region
        default: eu-west-1
        required: true
      confirm_destroy:
        description: Type DESTROY to confirm stack deletion
        required: true

permissions:
  contents: read
  id-token: write

jobs:
  destroy:
    name: Destroy CDK stack
    runs-on: ubuntu-latest
    concurrency:
      group: destroy-infra-${{ inputs.stack_name }}
      cancel-in-progress: false
    steps:
      - name: Check confirmation
        run: |
          if [ "${{ inputs.confirm_destroy }}" != "DESTROY" ]; then
            echo "confirm_destroy must be exactly DESTROY" >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: infra/package-lock.json

      - name: Install infra dependencies
        working-directory: infra
        run: npm ci

      - name: Build infra
        working-directory: infra
        run: npm run build

      - name: Destroy stack
        working-directory: infra
        run: npx cdk destroy "${{ inputs.stack_name }}" --force
