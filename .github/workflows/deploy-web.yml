name: Deploy Web

on:
  workflow_dispatch:
    inputs:
      stack_name:
        description: CloudFormation/CDK stack name
        default: BetDexIndexerStack
        required: true
      aws_region:
        description: AWS region
        default: eu-west-1
        required: true

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Build and publish React app
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-web-${{ inputs.stack_name }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Build web
        working-directory: web
        run: npm run build

      - name: Read web hosting outputs
        id: hosting
        run: |
          WEB_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name "${{ inputs.stack_name }}" \
            --query "Stacks[0].Outputs[?OutputKey=='WebBucketName'].OutputValue" \
            --output text)
          DISTRIBUTION_ID=$(aws cloudformation describe-stacks \
            --stack-name "${{ inputs.stack_name }}" \
            --query "Stacks[0].Outputs[?OutputKey=='WebDistributionId'].OutputValue" \
            --output text)
          if [ -z "$WEB_BUCKET" ] || [ "$WEB_BUCKET" = "None" ]; then
            echo "WebBucketName stack output was not found. Deploy infra first." >&2
            exit 1
          fi
          if [ -z "$DISTRIBUTION_ID" ] || [ "$DISTRIBUTION_ID" = "None" ]; then
            echo "WebDistributionId stack output was not found. Deploy infra first." >&2
            exit 1
          fi
          echo "web_bucket=$WEB_BUCKET" >> "$GITHUB_OUTPUT"
          echo "distribution_id=$DISTRIBUTION_ID" >> "$GITHUB_OUTPUT"

      - name: Upload web assets
        run: aws s3 sync web/dist "s3://${{ steps.hosting.outputs.web_bucket }}" --delete

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id "${{ steps.hosting.outputs.distribution_id }}" --paths "/*"
