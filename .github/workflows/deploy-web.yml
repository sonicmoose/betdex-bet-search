name: Deploy Web

on:
  workflow_dispatch:
    inputs:
      stack_name:
        description: CloudFormation/CDK stack name
        default: BetDexIndexerStack
        required: true
      aws_region:
        description: AWS region
        default: eu-west-1
        required: true

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Build and publish React app
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-web-${{ inputs.stack_name }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Read web stack outputs
        id: stack_outputs
        run: |
          WEB_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name "${{ inputs.stack_name }}" \
            --query "Stacks[0].Outputs[?OutputKey=='WebBucketName'].OutputValue" \
            --output text)
          DISTRIBUTION_ID=$(aws cloudformation describe-stacks \
            --stack-name "${{ inputs.stack_name }}" \
            --query "Stacks[0].Outputs[?OutputKey=='WebDistributionId'].OutputValue" \
            --output text)
          GRAPHQL_API_URL=$(aws cloudformation describe-stacks \
            --stack-name "${{ inputs.stack_name }}" \
            --query "Stacks[0].Outputs[?OutputKey=='GraphqlApiUrl'].OutputValue" \
            --output text)
          GRAPHQL_API_KEY=$(aws cloudformation describe-stacks \
            --stack-name "${{ inputs.stack_name }}" \
            --query "Stacks[0].Outputs[?OutputKey=='GraphqlApiKey'].OutputValue" \
            --output text)
          if [ -z "$WEB_BUCKET" ] || [ "$WEB_BUCKET" = "None" ]; then
            echo "WebBucketName stack output was not found. Deploy infra first." >&2
            exit 1
          fi
          if [ -z "$DISTRIBUTION_ID" ] || [ "$DISTRIBUTION_ID" = "None" ]; then
            echo "WebDistributionId stack output was not found. Deploy infra first." >&2
            exit 1
          fi
          if [ -z "$GRAPHQL_API_URL" ] || [ "$GRAPHQL_API_URL" = "None" ]; then
            echo "GraphqlApiUrl stack output was not found. Redeploy infra first." >&2
            exit 1
          fi
          if [ -z "$GRAPHQL_API_KEY" ] || [ "$GRAPHQL_API_KEY" = "None" ]; then
            echo "GraphqlApiKey stack output was not found. Redeploy infra first." >&2
            exit 1
          fi
          echo "web_bucket=$WEB_BUCKET" >> "$GITHUB_OUTPUT"
          echo "distribution_id=$DISTRIBUTION_ID" >> "$GITHUB_OUTPUT"
          echo "graphql_api_url=$GRAPHQL_API_URL" >> "$GITHUB_OUTPUT"
          echo "graphql_api_key=$GRAPHQL_API_KEY" >> "$GITHUB_OUTPUT"

      - name: Configure web API endpoint
        working-directory: web
        run: |
          {
            echo "VITE_APPSYNC_GRAPHQL_URL=${{ steps.stack_outputs.outputs.graphql_api_url }}"
            echo "VITE_APPSYNC_API_KEY=${{ steps.stack_outputs.outputs.graphql_api_key }}"
          } > .env.production

      - name: Build web
        working-directory: web
        run: npm run build

      - name: Upload web assets
        run: aws s3 sync web/dist "s3://${{ steps.stack_outputs.outputs.web_bucket }}" --delete

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id "${{ steps.stack_outputs.outputs.distribution_id }}" --paths "/*"
