name: Deploy Infra

on:
  workflow_dispatch:
    inputs:
      stack_name:
        description: CloudFormation/CDK stack name
        default: BetDexIndexerStack
        required: true
      aws_region:
        description: AWS region
        default: eu-west-1
        required: true
      enable_timestream:
        description: Enable Timestream resources. Only use if the AWS account has Timestream for LiveAnalytics access.
        default: 'false'
        required: true
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Deploy CDK stack
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-infra-${{ inputs.stack_name }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: infra/package-lock.json

      - name: Install infra dependencies
        working-directory: infra
        run: npm ci

      - name: Build infra
        working-directory: infra
        run: npm run build

      - name: Read current image URI
        id: current_image
        run: |
          IMAGE_URI=$(aws cloudformation describe-stacks \
            --stack-name "${{ inputs.stack_name }}" \
            --query "Stacks[0].Outputs[?OutputKey=='ContainerImage'].OutputValue" \
            --output text 2>/dev/null || true)
          if [ -n "$IMAGE_URI" ] && [ "$IMAGE_URI" != "None" ]; then
            echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy infra
        working-directory: infra
        run: |
          CONTEXT_ARGS=()
          if [ "${{ inputs.enable_timestream }}" = "true" ]; then
            CONTEXT_ARGS+=("-c" "enableTimestream=true")
          fi
          if [ -n "${{ steps.current_image.outputs.image_uri }}" ]; then
            npx cdk deploy "${{ inputs.stack_name }}" --require-approval never "${CONTEXT_ARGS[@]}" -c imageUri="${{ steps.current_image.outputs.image_uri }}"
          else
            npx cdk deploy "${{ inputs.stack_name }}" --require-approval never "${CONTEXT_ARGS[@]}"
          fi
