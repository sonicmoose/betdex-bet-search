betdex:
  rest-base-url: ${BETDEX_REST_BASE_URL:https://sandbox.api.monacoprotocol.xyz}
  stream-url: ${BETDEX_STREAM_URL:wss://sandbox.stream.api.monacoprotocol.xyz}
  app-key: ${BETDEX_APP_KEY:}
  api-key: ${BETDEX_API_KEY:}
  session-path: ${BETDEX_SESSION_PATH:/sessions}
  markets-path: ${BETDEX_MARKETS_PATH:/markets}
  markets-ids-param: ${BETDEX_MARKETS_IDS_PARAM:ids}
  markets-event-ids-param: ${BETDEX_MARKETS_EVENT_IDS_PARAM:eventIds}
  markets-page-param: ${BETDEX_MARKETS_PAGE_PARAM:page}
  markets-page-size-param: ${BETDEX_MARKETS_PAGE_SIZE_PARAM:size}
  subscription-ids: ${BETDEX_SUBSCRIPTION_IDS:*}
  markets-batch-size: ${BETDEX_MARKETS_BATCH_SIZE:50}
  markets-first-page: ${BETDEX_MARKETS_FIRST_PAGE:0}
  markets-page-size: ${BETDEX_MARKETS_PAGE_SIZE:100}
  markets-max-pages: ${BETDEX_MARKETS_MAX_PAGES:20}
  market-cache-ttl: ${BETDEX_MARKET_CACHE_TTL:12h}

aws:
  region: ${AWS_REGION:us-east-1}

opensearch:
  endpoint: ${OPENSEARCH_ENDPOINT:}
  raw-alias: betdex-stream-raw
  prices-alias: betdex-market-prices
  markets-current-index: betdex-markets-current
  events-current-index: betdex-events-current

appsync:
  graphql-url: ${APPSYNC_GRAPHQL_URL:}
  api-key: ${APPSYNC_API_KEY:}
  publish-price-updates: ${APPSYNC_PUBLISH_PRICE_UPDATES:true}
  publish-queue-capacity: ${APPSYNC_PUBLISH_QUEUE_CAPACITY:1000}
  publish-timeout: ${APPSYNC_PUBLISH_TIMEOUT:2s}

timestream:
  enabled: ${TIMESTREAM_ENABLED:false}
  database: ${TIMESTREAM_DATABASE:}
  table: ${TIMESTREAM_TABLE:}

ingest:
  queue-capacity: ${INGEST_QUEUE_CAPACITY:100000}
  worker-count: ${INGEST_WORKER_COUNT:6}
  raw-index-enabled: ${INGEST_RAW_INDEX_ENABLED:false}
  price-history-enabled: ${INGEST_PRICE_HISTORY_ENABLED:false}
  message-logging-enabled: ${INGEST_MESSAGE_LOGGING_ENABLED:true}
  reconnect:
    initial-delay: ${INGEST_RECONNECT_INITIAL_DELAY:1s}
    max-delay: ${INGEST_RECONNECT_MAX_DELAY:1m}
  stream:
    rotation-interval: ${INGEST_STREAM_ROTATION_INTERVAL:115m}
    dedupe-ttl: ${INGEST_STREAM_DEDUPE_TTL:10m}
  reconciliation:
    enabled: ${INGEST_RECONCILIATION_ENABLED:true}
    initial-delay: ${INGEST_RECONCILIATION_INITIAL_DELAY:2m}
    interval: ${INGEST_RECONCILIATION_INTERVAL:10m}
    max-markets: ${INGEST_RECONCILIATION_MAX_MARKETS:50000}
    batch-size: ${INGEST_RECONCILIATION_BATCH_SIZE:50}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    tags:
      application: betdex-indexer
