betdex:
  rest-base-url: ${BETDEX_REST_BASE_URL:https://sandbox.api.monacoprotocol.xyz}
  stream-url: ${BETDEX_STREAM_URL:wss://sandbox.stream.api.monacoprotocol.xyz}
  app-key: ${BETDEX_APP_KEY:}
  api-key: ${BETDEX_API_KEY:}
  session-path: ${BETDEX_SESSION_PATH:/sessions}

aws:
  region: ${AWS_REGION:us-east-1}

opensearch:
  endpoint: ${OPENSEARCH_ENDPOINT:}
  raw-alias: betdex-stream-raw
  prices-alias: betdex-market-prices
  markets-current-index: betdex-markets-current
  events-current-index: betdex-events-current

timestream:
  enabled: ${TIMESTREAM_ENABLED:false}
  database: ${TIMESTREAM_DATABASE:}
  table: ${TIMESTREAM_TABLE:}

ingest:
  queue-capacity: ${INGEST_QUEUE_CAPACITY:10000}
  worker-count: ${INGEST_WORKER_COUNT:2}
  reconnect:
    initial-delay: ${INGEST_RECONNECT_INITIAL_DELAY:1s}
    max-delay: ${INGEST_RECONNECT_MAX_DELAY:1m}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    tags:
      application: betdex-indexer
